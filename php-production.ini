; Many shared hosts (e.g. InfinityFree) enable output buffering by default,
; which lets session_start()/header() calls succeed even after HTML has
; already been echoed earlier in the script. The stock php:8.2-apache image
; doesn't, so this app's PHP files (which echo HTML before session_start())
; need it explicitly enabled to behave the same way here.
output_buffering = 4096
display_errors = Off
